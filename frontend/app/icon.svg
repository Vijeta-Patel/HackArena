<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0d0010" rx="6"/>
  <!-- Scale / balance beam -->
  <line x1="16" y1="7" x2="16" y2="26" stroke="#e894ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal beam -->
  <line x1="7" y1="11" x2="25" y2="11" stroke="#e894ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pan rope -->
  <line x1="9" y1="11" x2="7" y2="18" stroke="#e894ff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="11" x2="11" y2="18" stroke="#e894ff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right pan rope -->
  <line x1="23" y1="11" x2="21" y2="18" stroke="#e894ff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="11" x2="25" y2="18" stroke="#e894ff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M6 18 Q9 21 12 18" stroke="#e894ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right pan (slightly lower = imbalance) -->
  <path d="M20 19.5 Q23 22.5 26 19.5" stroke="#ff5555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="13" y1="26" x2="19" y2="26" stroke="#e894ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top pin dot -->
  <circle cx="16" cy="7" r="1.5" fill="#e894ff"/>
</svg>
