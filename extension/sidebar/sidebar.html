<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Caveat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0010;
  --bg1:    #180020;
  --bg2:    #220030;
  --acc:    #e894ff;
  --acc-bg: rgba(232,148,255,0.12);
  --bdr:    rgba(232,148,255,0.22);
  --bdr1:   rgba(232,148,255,0.4);
  --txt:    #ffffff;
  --txt2:   #d4b8e0;
  --txt3:   #8a6a9a;
  --red:    #ff5555; --orange:#ff8c42; --yellow:#ffc542; --blue:#42b4ff; --green:#42ffa1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  width:400px;min-height:200px;max-height:600px;
  overflow-y:auto;overflow-x:hidden;
  font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--txt);
  font-size:13px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr1)}

/* HEADER */
.hdr{
  padding:11px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:2px solid var(--bdr1);background:var(--bg1);
  position:sticky;top:0;z-index:20;
}
.logo{font-size:13px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:7px}
.logo em{background:var(--acc);color:var(--bg);font-style:normal;font-size:8px;font-weight:900;padding:2px 5px;letter-spacing:.08em}
.hdr-url{flex:1;font-size:10px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.hdr-btn{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px;padding:3px;transition:color .15s}
.hdr-btn:hover{color:var(--acc)}

/* STATES */
/* ── No Legal ── */
.no-legal{padding:36px 20px;text-align:center}
.no-legal-icon{font-size:2.8rem;margin-bottom:14px;display:block}
.no-legal-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#fff;margin-bottom:8px}
.no-legal-sub{font-size:11px;color:var(--txt2);line-height:1.6;margin-bottom:20px}

/* ── Risk Banner ── */
.risk-banner{
  margin:12px;padding:14px;
  border-left:4px solid var(--acc);border:2px solid var(--bdr1);border-left-width:4px;
  display:flex;align-items:center;gap:12px;
}
.risk-banner.high   {border-color:var(--red);background:rgba(255,85,85,.08);border-left-color:var(--red)}
.risk-banner.medium {border-color:var(--orange);background:rgba(255,140,66,.08);border-left-color:var(--orange)}
.risk-banner.safe   {border-color:var(--green);background:rgba(66,255,161,.08);border-left-color:var(--green)}
.risk-banner.neutral{border-color:var(--bdr1);background:var(--bg1);border-left-color:var(--acc)}
.risk-icon{font-size:1.8rem;flex-shrink:0}
.risk-title{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#fff}
.risk-sub{font-size:10px;color:var(--txt2);margin-top:3px;font-weight:600}

/* ── Pills ── */
.pills{padding:0 12px 12px;display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#ffaaaa;background:rgba(255,85,85,.12);border:1px solid rgba(255,85,85,.3)}

/* ── Divider ── */
.sep{border:none;border-top:1px solid var(--bdr);margin:0}

/* ── Lang ── */
.lang-row{padding:10px 12px;display:flex;align-items:center;gap:10px;background:var(--bg1);border-bottom:1px solid var(--bdr)}
.lang-lbl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);flex-shrink:0}
.lang-sel{
  flex:1;background:var(--bg2);border:1px solid var(--bdr1);
  color:#fff;font-family:inherit;font-size:11px;font-weight:700;
  padding:7px 10px;cursor:pointer;outline:none;
}
.lang-sel:focus{border-color:var(--acc)}
.lang-sel option{background:#220030;color:#fff}

/* ── Buttons ── */
.actions{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.btn{
  width:100%;padding:11px 14px;font-family:inherit;
  font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .1s;
}
.btn-p{background:var(--acc);color:var(--bg);border:2px solid var(--acc);box-shadow:3px 3px 0 rgba(232,148,255,.25)}
.btn-p:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 rgba(232,148,255,.25)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:transparent;color:var(--txt2);border:2px solid var(--bdr1)}
.btn-g:hover{border-color:var(--acc);color:var(--acc)}

/* ── Loading ── */
.loading{padding:36px 20px;text-align:center}
.spinner{width:34px;height:34px;margin:0 auto 16px;border:2px solid var(--bdr);border-top-color:var(--acc);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--acc);margin-bottom:6px}
.load-stage{font-size:10px;color:var(--txt2);font-weight:600;margin-bottom:14px}
.load-steps{display:flex;flex-direction:column;gap:5px;max-width:260px;margin:0 auto}
.load-step{padding:7px 10px;border:1px solid var(--bdr);font-size:10px;color:var(--txt2);font-weight:600;text-align:left;background:var(--bg1)}

/* ── Results ── */
.score-row{
  padding:14px 12px;display:flex;align-items:center;gap:14px;
  border-bottom:2px solid var(--bdr1);background:var(--bg1);
}
.score-circle{
  width:58px;height:58px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid currentColor;
}
.score-num{font-size:22px;font-weight:900;line-height:1}
.score-lbl{font-size:7px;font-weight:800;opacity:.8;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.sign-col{display:flex;flex-direction:column;gap:6px;flex:1}
.sign-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:.06em;width:fit-content;
}
.s-ok {background:rgba(66,255,161,.12);color:#42ffa1;border:1px solid rgba(66,255,161,.3)}
.s-bad{background:rgba(255,85,85,.12); color:#ff8080;border:1px solid rgba(255,85,85,.3)}
.power-txt{font-size:9px;color:var(--txt3);font-weight:700}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:2px solid var(--bdr1)}
.stat-cell{padding:10px 6px;text-align:center;border-right:1px solid var(--bdr)}
.stat-cell:last-child{border-right:none}
.stat-num{font-size:22px;font-weight:900;line-height:1}
.stat-lbl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-top:3px}

.summary{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:11px;color:var(--txt2);line-height:1.65;font-weight:500}

.clauses-hdr{
  padding:8px 12px;border-bottom:1px solid var(--bdr);
  font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);
  background:var(--bg1);
}
.clause{border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.clause:hover{background:var(--bg1)}
.clause-top{padding:10px 12px;display:flex;align-items:center;gap:7px}
.rdot{width:8px;height:8px;flex-shrink:0}
.rbadge{padding:2px 7px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.bv{background:rgba(255,85,85,.15); color:#ff9090}
.bh{background:rgba(255,140,66,.15);color:#ffb090}
.bm{background:rgba(255,197,66,.15);color:#ffe090}
.bl{background:rgba(66,180,255,.15);color:#90d0ff}
.bc{background:rgba(66,255,161,.15);color:#90ffcf}
.ctype{font-size:9px;color:var(--txt3);font-weight:700;text-transform:uppercase;margin-left:auto;letter-spacing:.04em}
.clause-body{display:none;padding:8px 12px 12px;border-top:1px solid var(--bdr);font-size:10px;color:var(--txt2);line-height:1.6}
.clause.open .clause-body{display:block}
.why{margin-bottom:6px;color:#d4b8e0}
.dpill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:rgba(236,72,153,.12);border:1px solid rgba(236,72,153,.3);color:#f9a8d4;font-size:8px;font-weight:800;text-transform:uppercase;margin-bottom:5px}
.fair-box{margin-top:6px;padding:7px 9px;background:rgba(66,255,161,.06);border-left:2px solid var(--green);font-size:10px;color:#90ffcf;line-height:1.5}
.neg-box {margin-top:5px;padding:7px 9px;background:rgba(66,180,255,.06);border-left:2px solid var(--blue);font-size:10px;color:#90d0ff;line-height:1.5}

.more-note{padding:8px 12px;font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;text-align:center;border-bottom:1px solid var(--bdr)}

.foot{padding:10px 12px;display:flex;gap:7px;border-top:2px solid var(--bdr1);background:var(--bg1);position:sticky;bottom:0}
.foot .btn{padding:9px 12px;font-size:10px}

.err-box{margin:12px;padding:12px;background:rgba(255,85,85,.08);border:2px solid rgba(255,85,85,.35);color:#ffaaaa;font-size:11px;line-height:1.5;font-weight:600}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">⚖ Caveat <em>AI</em></div>
  <span class="hdr-url" id="page-url">—</span>
  <button class="hdr-btn" id="settings-btn" title="Settings">⚙</button>
</div>

<div id="root"></div>

<script src="sidebar.js"></script>
</body>
</html>
